# CI duration distribution (ticks = minutes):
#   When rebased, pipelines get random-ish durations from this pool.
#   Weighted toward 5-10 (common fast), with tail up to 25 (integration/e2e suites).
# The sha_pools provide deterministic SHAs; pipeline durations are set by the
# mutations module (default 3 ticks for running). We override via scenario config below.

# Pipeline duration configuration (applied by sim when creating pipelines on rebase)
pipeline_durations:
  distribution: weighted
  min_ticks: 5
  max_ticks: 25
  weights:
    5: 15
    6: 20
    7: 20
    8: 18
    9: 12
    10: 8
    11: 5
    12: 4
    13: 3
    14: 3
    15: 2
    16: 2
    17: 2
    18: 2
    19: 1
    20: 1
    21: 1
    22: 1
    23: 1
    24: 1
    25: 1

sha_pools:
  target_advances:
    master: [
      target-002, target-003, target-004, target-005, target-006,
      target-007, target-008, target-009, target-010, target-011,
      target-012, target-013, target-014, target-015, target-016,
      target-017, target-018, target-019, target-020, target-021,
      target-022, target-023, target-024, target-025, target-026,
