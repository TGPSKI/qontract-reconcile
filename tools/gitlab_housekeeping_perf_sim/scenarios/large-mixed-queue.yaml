# Scenario: Large Mixed Queue (100 MRs)
# Simulates a realistic busy queue with:
#   - 100 MRs with widely varying CI durations (5-25 ticks, avg ~8)
#   - Mixed priorities (1-10)
#   - Staggered arrival: some already running, some pending, some not yet rebased
#   - Diverse tenant domains for Phase 1 testing
#
# One tick ≈ 1 minute of CI time.
# Pipeline durations: 5-25 ticks (minutes), weighted toward 6-10.

