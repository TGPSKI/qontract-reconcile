    iid: 1
    title: "MR 1 - clean fast candidate"
    state: opened
    sha: mr1-sha-001
    rebased_target_sha: target-001
    labels: ["lgtm"]
    tenant_domains: ["tenant-a"]
    priority: 1
    pipelines:
